name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.102.22
          username: root
          password: 12345
          script: |
            whoami
            pwd
            ls
            docker ps